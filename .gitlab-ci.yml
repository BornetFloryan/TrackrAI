stages:
  - validate
  - build
  - test

variables:
  COMPOSE_PROJECT_NAME: "trackrai-ci"
  API_BASE_URL: "http://localhost:4567/trackrapi"
  CENTRAL_HOST: "localhost"
  CENTRAL_PORT: "29000"

validate-compose:
  stage: validate
  tags:
    - docker
  script:
    - docker compose -f docker-compose.ci.yml config --quiet

build-services:
  stage: build
  tags:
    - docker
  script:
    - docker compose -f docker-compose.ci.yml build

acceptance-tests:
  stage: test
  tags:
    - docker
  script:
    - docker compose -f docker-compose.ci.yml up -d --build --wait
    - curl --fail --retry 10 --retry-delay 2 http://localhost:4567/trackrapi/health
    - curl --fail --retry 10 --retry-delay 2 http://localhost:8080/
    - cd TrackrAIAcceptanceTests
    - mvn -B test
  after_script:
    - docker compose -f docker-compose.ci.yml down -v --remove-orphans
